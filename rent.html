<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍分帳 - 粉紫浪漫版</title>
    <style>
        /* 基礎設置與漸層背景 */
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            padding: 30px; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); /* 柔和漸層背景 */
            color: #4a4e69; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 主容器 */
        .container { 
            max-width: 600px; 
            width: 100%;
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(235, 185, 222, 0.4); /* 粉紫色陰影 */
            border: 2px solid #f3e5f5; /* 超淡紫邊框 */
        }

        /* 標題 */
        h2 { 
            text-align: center; 
            color: #9c27b0; /* 深粉紫 */
            margin-bottom: 30px; 
            font-size: 26px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(156, 39, 176, 0.2);
        }

        /* 輸入群組 */
        .input-group { margin-bottom: 25px; }

        /* 標籤 */
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: bold; 
            color: #6a1b9a; /* 紫色 */
            font-size: 16px;
        }

        /* 輸入框 (數字 & 文字區域) */
        input, textarea { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #e1bee7; /* 淡紫邊框 */
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: 0.3s;
            background-color: #fff;
        }

        /* 輸入框 Focus 樣式 */
        input:focus, textarea:focus {
            border-color: #ba68c8; /* 中粉紫 */
            box-shadow: 0 0 10px rgba(186, 104, 200, 0.3);
            outline: none;
        }

        /* 文字區域 */
        textarea { 
            height: 160px; 
            font-size: 14px; 
            line-height: 1.6; 
            resize: vertical; 
        }

        /* 按鈕 */
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #ec407a 0%, #ab47bc 100%); /* 粉紅到紫漸層 */
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold; 
            transition: transform 0.2s, box-shadow 0.2s; 
            letter-spacing: 1px;
            margin-top: 10px;
        }

        /* 按鈕 Hover & Active 樣式 */
        button:hover { 
            box-shadow: 0 5px 15px rgba(236, 64, 122, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* 輸出結果區塊 */
        #result { 
            margin-top: 35px; 
            white-space: pre-wrap; 
            background-color: #fce4ec; /* 極淡粉紅背景 */
            color: #880e4f; /* 深粉紅文字 */
            padding: 25px; 
            border-radius: 15px; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 15px; 
            line-height: 1.8; 
            border: 2px dashed #f8bbd0; /* 粉紅虛線邊框 */
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 提示文字 */
        .hint { 
            font-size: 13px; 
            color: #8e24aa; /* 紫色 */
            margin-bottom: 12px; 
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>宿舍分帳小幫手</h2>
    
    <div class="input-group">
        <label>1. 每人應付房租 (33000 ÷ 4)</label>
        <input type="number" id="baseRent" value="8250">
    </div>

    <div class="input-group">
        <label>2. 直接貼上表格內容</label>
        <span class="hint">從 Notion/Excel 複製整列貼上即可（名字/項目/金額）</span>
        <textarea id="pasteArea" placeholder="在此處貼上..."></textarea>
    </div>

    <button onclick="generateReport()">生成結算表 💖</button>

    <div id="result" style="display:none;"></div>
</div>

<script>
    function generateReport() {
        const rawText = document.getElementById('pasteArea').value.trim();
        const baseRent = parseFloat(document.getElementById('baseRent').value);
        
        if (!rawText) {
            alert("親，請先貼入內容喔！");
            return;
        }

        // 定義輸出的固定順序
        const targetOrder = ["LISA", "雲暇", "MIYU", "江育文"];
        
        const lines = rawText.split('\n');
        let expenses = [];
        let roommatePaid = { "LISA": 0, "雲暇": 0, "MIYU": 0, "江育文": 0 };
        let totalExtra = 0;

        lines.forEach(line => {
            const cols = line.split(/\t| {2,}/); 
            if (cols.length < 4 || line.includes("項目")) return;

            const itemName = cols[0].trim();
            const amountStr = cols[3].replace(/[$,]/g, '');
            const amount = parseFloat(amountStr);
            const payer = cols[cols.length - 1].trim();

            if (!isNaN(amount) && roommatePaid.hasOwnProperty(payer)) {
                expenses.push({ itemName, amount, payer });
                roommatePaid[payer] += amount;
                totalExtra += amount;
            }
        });

        if (expenses.length === 0) {
            alert("抱歉，解析失敗，請確認格式是否正確。");
            return;
        }

        const extraPerPerson = totalExtra / 4;

        // 構建報表文字
        let report = "🌸 雜費項目:\n";
        expenses.forEach(ex => {
            report += `${ex.payer} - ${ex.itemName} : $${ex.amount}\n`;
        });
        report += "====每人一號前請匯款到我的戶頭====\n";

        // 依照指定順序生成報表
        targetOrder.forEach(name => {
            const reimbursement = roommatePaid[name];
            const finalPay = (baseRent + extraPerPerson) - reimbursement;
            
            // 使用 toFixed(1) 保留一位小數
            report += `${name} : (${baseRent} + ${extraPerPerson.toFixed(1)}) - ${reimbursement} = ${finalPay.toFixed(1)}\n`;
        });

        const resultDiv = document.getElementById('result');
        resultDiv.innerText = report;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
